# NOTE: No "version:" line — removed as it's obsolete in modern Docker
services:

  # ── PHP Application ──────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: housing_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - housing_net
    depends_on:
      db:
        condition: service_healthy

  # ── Nginx Web Server ─────────────────────────────────────
  webserver:
    image: nginx:alpine
    container_name: housing_webserver
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - housing_net
    depends_on:
      - app

  # ── MySQL Database ───────────────────────────────────────
  db:
    image: mysql:8.0
    platform: linux/amd64
    container_name: housing_db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE:      housing_db
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER:          housing_user
      MYSQL_PASSWORD:      secret
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - housing_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── phpMyAdmin ───────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: housing_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: housing_user
      PMA_PASSWORD: secret
      PMA_PORT: 3306
    networks:
      - housing_net
    depends_on:
      db:
        condition: service_healthy

networks:
  housing_net:
    driver: bridge

volumes:
  dbdata: